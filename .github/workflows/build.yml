name: Build RDKit Debian Packages

on:
  push:
    tags:
      - "Release_*"
  workflow_dispatch:
    inputs:
      rdkit_tag:
        description: "RDKit release tag (e.g. Release_2026_03_1)"
        required: true
      build_number:
        description: "Build number (increment when rebuilding same RDKit version)"
        required: true

jobs:
  parse-tag:
    runs-on: ubuntu-latest
    outputs:
      rdkit_tag: ${{ steps.parse.outputs.rdkit_tag }}
      build_number: ${{ steps.parse.outputs.build_number }}
    steps:
      - name: Parse version from tag or inputs
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            # Tag format: Release_YYYY_MM_P+B (e.g. Release_2024_09_1+1)
            # Split on + to get rdkit_tag and build_number
            RDKIT_TAG="${TAG%+*}"
            BUILD_NUMBER="${TAG##*+}"

            # Validate rdkit_tag looks like Release_YYYY_MM_P
            if ! echo "$RDKIT_TAG" | grep -qE '^Release_[0-9]{4}_[0-9]{2}_[0-9]+$'; then
              echo "::error::Invalid tag format: '$TAG'. Expected Release_YYYY_MM_P+BUILD (e.g. Release_2024_09_1+1)"
              exit 1
            fi

            # Validate build_number is a positive integer
            if ! echo "$BUILD_NUMBER" | grep -qE '^[0-9]+$'; then
              echo "::error::Invalid build number: '$BUILD_NUMBER'. Tag must end with +N where N is a number."
              exit 1
            fi

            echo "Parsed tag '$TAG' -> rdkit_tag=$RDKIT_TAG build_number=$BUILD_NUMBER"
          else
            RDKIT_TAG="${{ inputs.rdkit_tag }}"
            BUILD_NUMBER="${{ inputs.build_number }}"
            echo "Using workflow inputs -> rdkit_tag=$RDKIT_TAG build_number=$BUILD_NUMBER"
          fi

          echo "rdkit_tag=$RDKIT_TAG" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

  build:
    needs: parse-tag
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container: debian:bookworm
    steps:
      - name: Install git
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            curl \
            libeigen3-dev \
            libboost-all-dev \
            rapidjson-dev

      - name: Install nfpm
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/download/v2.46.0/nfpm_2.46.0_$(dpkg --print-architecture).deb -o /tmp/nfpm.deb
          dpkg -i /tmp/nfpm.deb
          rm /tmp/nfpm.deb

      - name: Build RDKit and package
        run: ./build.sh ${{ needs.parse-tag.outputs.rdkit_tag }} ${{ needs.parse-tag.outputs.build_number }}

      - name: Verify packages
        run: |
          dpkg -i librdkit-rs_*.deb librdkit-rs-dev_*.deb
          dpkg -l librdkit-rs librdkit-rs-dev
          pkg-config --cflags --libs rdkit
          ls /usr/include/rdkit/GraphMol/ROMol.h

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.arch }}
          path: "*.deb"

      - name: Upload to S3
        if: startsWith(github.ref, 'refs/tags/')
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
        run: |
          apt-get install -y --no-install-recommends python3-pip
          pip3 install awscli --break-system-packages
          for deb in *.deb; do
            aws s3 cp "$deb" s3://rdkit-rs-debian/pool/
          done
