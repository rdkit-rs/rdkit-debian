name: Build and publish Debian packages

on:
  push: { }

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:
  build_amd64:
    runs-on: buildjet-16vcpu-ubuntu-2204
    container:
      image: ubuntu:22.04
      options: "--privileged"
      # options: --user 1001 # https://github.com/actions/runner/issues/2033#issuecomment-1598547465
    env:
      DIST: noble
      ARCH: amd64
      DEB_BUILD_OPTIONS: nocheck
      DEBIAN_FRONTEND: noninteractive
      DEBCONF_NONINTERACTIVE_SEEN: "true"
    steps:
      - name: Reinstall tools missing from base docker image
        run: |
          apt-get update > /dev/null
          apt-get install -y git nodejs sudo
          usermod -aG sudo root
          git config --global --add safe.directory /__w/rdkit-debian/rdkit-debian
          sudo echo "hi"

      - name: Check out the repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install build tools
        run: |
          git branch -a
          sudo apt-get update
          echo $DEBIAN_FRONTEND
          echo 'tzdata tzdata/Areas select Etc' | debconf-set-selections
          echo 'tzdata tzdata/Zones/Etc select UTC' | debconf-set-selections
          sudo apt-get install -y postgresql-common postgresql-client-common postgresql-server-dev-14 -y --allow-downgrades
          # sudo echo "MIRRORSITE=http://ports.ubuntu.com/ubuntu-ports/" > /etc/pbuilderrc
          sudo echo "MIRRORSITE=http://archive.ubuntu.com/ubuntu/" > /etc/pbuilderrc
          sudo apt-get install -y git build-essential git-buildpackage debhelper dh-python

      - name: Create base image
        run: sudo git-pbuilder create --architecture=$ARCH --dist=$DIST

      - name: Remove github stuff
        run: rm -r .github/

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3

      - name: Build package
        run: sudo gbp buildpackage --git-ignore-new --git-pbuilder --git-no-pristine-tar --git-arch=$ARCH --git-dist=$DIST -us -uc

      - name: Check for debs
        run: ls -alh .; ls -alh ..

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::989722935798:role/gha-rdkit-debian
          role-session-name: samplerolesession
          aws-region: eu-central-1
      # Upload a file to AWS s3
      - name: Copy index.html to s3
        run: |
          sudo apt-get install ruby awscli
          sudo gem install deb-s3
          aws sts get-caller-identity
          aws s3 ls s3://rdkit-rs-debian/
          deb-s3 upload --bucket=rdkit-rs-debian --s3-region=eu-central-1 --arch=$ARCH --codename=$DIST ../*.deb

